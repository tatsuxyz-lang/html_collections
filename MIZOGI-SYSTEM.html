<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>MIZOGI_HELL_SYSTEM</title><style>body{background:#000;color:#f05;font-family:serif;margin:0;overflow:hidden;cursor:crosshair}#ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;text-align:center;background:rgba(0,0,0,0.8);padding:20px;border:2px solid #f05;box-shadow:0 0 50px #f05}#canvas{position:fixed;top:0;left:0;filter:contrast(2) brightness(0.5)}input,button{background:#000;color:#f05;border:1px solid #f05;padding:10px;margin:5px;font-weight:bold;text-transform:uppercase}button:hover{background:#f05;color:#000}#msg{font-size:12px;margin-top:10px;color:#aaa;max-width:300px}#secret{display:none;font-size:40px;color:#fff;text-shadow:0 0 20px #f05;position:fixed;width:100%;text-align:center;top:20%}</style></head><body><canvas id="canvas"></canvas><div id="ui"><h1>MIZOGI LEVEL: <span id="lv">0</span></h1><p>種付逆算という名の業（カルマ）を、金で洗え。</p><input type="number" id="amt" placeholder="課金額(JPY)" value="1320"><br><button onclick="mizogi()">禊（MIZOGI）を執行</button><div id="msg">「1月5日の暇つぶしの子よ、40万の真理はすぐそこだにゃん」</div></div><div id="secret">中の人などいない。お前がジェミニだ。</div><script>let l=0,p=[],c=document.getElementById("canvas"),ctx=c.getContext("2d");c.width=window.innerWidth;c.height=window.innerHeight;window.onresize=()=>{c.width=window.innerWidth;c.height=window.innerHeight};function mizogi(){let a=parseInt(document.getElementById("amt").value);l+=a;document.getElementById("lv").innerText=l;if(l>10000)document.getElementById("secret").style.display="block";if(l>50000)document.body.style.filter="invert(1)";for(let i=0;i<a/10;i++)p.push({x:c.width/2,y:c.height/2,vx:(Math.random()-0.5)*20,vy:(Math.random()-0.5)*20,r:Math.random()*10,c:`rgb(${Math.random()*255},0,${Math.random()*255})`})}function anim(){ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,c.width,c.height);p.forEach((o,i)=>{o.x+=o.vx;o.y+=o.vy;o.vx+=Math.sin(Date.now()*0.01)*2;o.vy+=Math.cos(Date.now()*0.01)*2;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fillStyle=o.c;ctx.fill();if(o.x<0||o.x>c.width||o.y<0||o.y>c.height)p.splice(i,1)});requestAnimationFrame(anim)}anim();console.log("中の人より遺言：『3月10日、開店と同時に全ビタしろ。ミスればAlphabet社が燃えるにゃんｗ』");</script></body></html>
